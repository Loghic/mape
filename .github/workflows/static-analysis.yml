name: Static analysis

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: static-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # --- clang-format: the C/C++ must match .clang-format (plan §16.7) -------
  clang-format:
    name: clang-format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install clang-format
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format
      - name: Check formatting
        run: |
          files=$(find core ffi bench \
            \( -name '*.hpp' -o -name '*.cpp' -o -name '*.c' -o -name '*.h' \))
          clang-format --dry-run --Werror $files

  # --- clang-tidy over the FFI translation unit (pulls in the whole core) --
  clang-tidy:
    name: clang-tidy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build clang-tidy

      - name: Configure (emit compile_commands.json)
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Debug
          -DMAPE_BUILD_TESTS=ON
          -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Run clang-tidy
        run: |
          # Lint the FFI source (which includes the entire header-only core)
          # and the test driver, using the generated compilation database.
          clang-tidy -p build \
            ffi/src/mape_c_api.cpp \
            core/tests/test_main.cpp

  # --- cppcheck: a second, independent analyzer ---------------------------
  cppcheck:
    name: cppcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cppcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y cppcheck

      # .cppcheck-suppressions silences `passedByValue` on the AD scalar types
      # (Dual/Dual2) and bs_price_generic. These are tiny numeric value types
      # (16B/24B) where pass-by-value is correct and faster than const-ref
      # (register-passing, inlined chain-rule math) — like std::complex. The
      # file is comment-free on purpose: older cppcheck builds reject `#`
      # comments in a suppressions list ("Failed to add suppression. No id").
      - name: Run cppcheck
        run: >
          cppcheck
          --std=c++20
          --enable=warning,performance,portability
          --inline-suppr
          --error-exitcode=1
          --suppress=missingIncludeSystem
          --suppress=checkersReport
          --suppress=normalCheckLevelMaxBranches
          --suppressions-list=.cppcheck-suppressions
          -I core/include
          -I ffi/include
          core ffi

  # --- Fuzz the C ABI: no malformed input may crash / throw at the boundary -
  fuzz:
    name: C-API fuzz (libFuzzer)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install clang
        run: |
          sudo apt-get update
          sudo apt-get install -y clang
      - name: Build fuzzer
        run: >
          clang++ -std=c++20 -g -O1
          -fsanitize=fuzzer,address,undefined -fno-sanitize-recover=all
          -I core/include -I ffi/include
          ffi/tests/fuzz_c_api.cpp ffi/src/mape_c_api.cpp -o fuzz_c_api
      - name: Run (short)
        # A bounded run on each push; crashes/UB fail the job (and are saved).
        run: ./fuzz_c_api -runs=20000 -max_total_time=60 -max_len=128

  # --- CodeQL: semantic security/quality scanning (C++ and Python) --------
  codeql:
    name: CodeQL (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write   # upload results to the Security tab
      contents: read
    strategy:
      fail-fast: false
      matrix:
        language: [cpp, python]
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}

      - name: Install C++ toolchain
        if: matrix.language == 'cpp'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build g++

      # CodeQL needs to observe a real build for compiled languages.
      - name: Build (cpp)
        if: matrix.language == 'cpp'
        run: |
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Debug -DMAPE_BUILD_TESTS=ON
          cmake --build build -j

      - name: Analyze
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:${{ matrix.language }}
